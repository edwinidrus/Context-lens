<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="850" viewBox="0 0 1200 850" role="img" aria-labelledby="title description">
<title id="title">LOCA-bench task accuracy falls as context workload grows</title>
<desc id="description">Line chart of the seven models published in LOCA-bench Table 1, from 8K to 256K environment description tokens. Every model has lower task success accuracy at 256K than at 8K. A coverage note says that no author-published, like-for-like curves for newer model releases were verified as of 12 July 2026.</desc>
